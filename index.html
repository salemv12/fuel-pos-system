<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نظام محطة الوقود</title>

<style>
body {margin:0;font-family:Arial;background:#0a2540;color:white;direction:rtl;}
.container {display:flex;height:100vh;}

.left {width:30%;background:#133b5c;padding:10px;}
.bill {background:#0a2540;height:60%;padding:10px;overflow:auto;border-radius:10px;}
.total {margin-top:10px;font-size:20px;}
.pay {width:100%;padding:15px;background:#16a34a;border:none;border-radius:10px;color:white;}

.center {width:40%;padding:10px;}

.display {
  background:#000;padding:20px;font-size:36px;text-align:center;
  border-radius:15px;margin-bottom:10px;color:#00ffcc;
}

/* الخزانات */
.tanks {
  background:#0f3b5f;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.pumps {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.pump {
  background:#1e5f8a;
  padding:15px;
  border-radius:15px;
  text-align:center;
  cursor:pointer;
}

.pump.active {background:#22c55e;}

.keypad {
  margin-top:10px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.keypad button {
  padding:20px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
}

.right {width:30%;padding:10px;}
.btn {width:100%;padding:15px;margin:5px;border:none;border-radius:10px;color:white;}
.green{background:#22c55e;}
.red{background:#ef4444;}

</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="left">
<h3>الفاتورة</h3>
<div class="bill" id="bill"></div>
<div class="total" id="total">المجموع: 0 أوقية</div>
<button class="pay" onclick="pay()">💳 دفع</button>
</div>

<!-- CENTER -->
<div class="center">

<!-- 🔥 الخزانات -->
<div class="tanks">
<p id="tankPetrol">خزان البنزين: 2000 لتر</p>
<p id="tankDiesel1">مازوت خزان 1: 1000 لتر</p>
<p id="tankDiesel2">مازوت خزان 2: 1000 لتر</p>
</div>

<div class="display" id="display">0</div>

<div class="pumps">
<div class="pump" onclick="selectPump(this,1,'بنزين',58.97)">بنزين 1</div>
<div class="pump" onclick="selectPump(this,2,'بنزين',58.97)">بنزين 2</div>
<div class="pump" onclick="selectPump(this,3,'ديزل1',56.35)">ديزل 1</div>
<div class="pump" onclick="selectPump(this,4,'ديزل2',56.35)">ديزل 2</div>
</div>

<div class="keypad">
<button onclick="add(7)">7</button>
<button onclick="add(8)">8</button>
<button onclick="add(9)">9</button>
<button onclick="add(4)">4</button>
<button onclick="add(5)">5</button>
<button onclick="add(6)">6</button>
<button onclick="add(1)">1</button>
<button onclick="add(2)">2</button>
<button onclick="add(3)">3</button>
<button onclick="add(0)">0</button>
<button onclick="clearInput()">مسح</button>
</div>

</div>

<!-- RIGHT -->
<div class="right">
<button class="btn green" onclick="startFuel()">ابدأ</button>
<button class="btn red" onclick="cancel()">إلغاء</button>
</div>

</div>

<script>

// 🔊 صوت
const ctx=new (window.AudioContext||window.webkitAudioContext)();
function beep(f,t,v){
 let o=ctx.createOscillator(),g=ctx.createGain();
 o.connect(g);g.connect(ctx.destination);
 o.frequency.value=f;g.gain.value=v;
 o.start();o.stop(ctx.currentTime+t);
}

// الخزانات
let petrolTank=2000;
let diesel1=1000;
let diesel2=1000;

// النظام
let pump=null,input="",total=0,type="",price=0;

function selectPump(el,p,t,pr){
 document.querySelectorAll(".pump").forEach(x=>x.classList.remove("active"));
 el.classList.add("active");
 pump=p;type=t;price=pr;
}

function add(n){
 input+=n;
 document.getElementById("display").innerText=input;
 beep(800,0.05,0.1);
}

function clearInput(){
 input="";
 document.getElementById("display").innerText="0";
}

function startFuel(){
 if(!pump)return alert("اختر مضخة");

 let liters=parseFloat(input||0);

 if(type==="بنزين"){
  if(liters>petrolTank)return alert("لا يوجد بنزين كافي");
  petrolTank-=liters;
 }

 if(type==="ديزل1"){
  if(liters>diesel1)return alert("الخزان 1 فارغ");
  diesel1-=liters;
 }

 if(type==="ديزل2"){
  if(liters>diesel2)return alert("الخزان 2 فارغ");
  diesel2-=liters;
 }

 document.getElementById("tankPetrol").innerText="خزان البنزين: "+petrolTank;
 document.getElementById("tankDiesel1").innerText="مازوت خزان 1: "+diesel1;
 document.getElementById("tankDiesel2").innerText="مازوت خزان 2: "+diesel2;

 let cost=liters*price;
 total+=cost;

 document.getElementById("bill").innerHTML+=
 `<p>${type} - ${liters}L = ${cost.toFixed(2)}</p>`;

 document.getElementById("total").innerText="المجموع: "+total;

 input="";
 document.getElementById("display").innerText="0";
}

function pay(){
 alert("تم الدفع: "+total);
 location.reload();
}

function cancel(){
 location.reload();
}

</script>

</body>
</html>
