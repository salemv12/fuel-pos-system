<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Fuel Pro Cloud</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<!-- Charts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#f1f5f9;direction:rtl;margin:0}
.container{padding:15px}

.card{
 background:linear-gradient(135deg,#c9a24b,#a67c2d);
 color:white;padding:20px;border-radius:20px;margin-bottom:10px
}

.stock-card{
 background:white;padding:15px;border-radius:15px;margin-top:10px;
 display:flex;justify-content:space-between;font-size:20px;font-weight:bold
}

.display{
 background:white;color:#c9a24b;padding:20px;border-radius:15px;
 text-align:center;font-size:30px;margin:10px 0
}

.pumps{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.pump{padding:30px;border-radius:20px;text-align:center;font-size:20px;cursor:pointer}
.petrol{background:#22c55e;color:white}
.diesel{background:#facc15}

.keypad{display:none;grid-template-columns:repeat(3,1fr);gap:10px}
.keypad button{padding:20px;font-size:20px}

.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px}
.btn{padding:15px;border:none;border-radius:10px}
.green{background:#c9a24b;color:white}
.red{background:#ef4444;color:white}

.modal{
 display:none;position:fixed;top:0;left:0;width:100%;height:100%;
 background:#00000088
}
.modal-box{
 background:white;margin:40px auto;padding:20px;border-radius:15px;width:90%
}

canvas{background:white;border-radius:15px;margin-top:10px}
</style>
</head>

<body>

<div class="container">

<div class="card">⛽ Fuel Pro Cloud</div>

<div class="stock-card">⛽ البنزين <span id="pStock"></span></div>
<div class="stock-card">🟡 مازوت1 <span id="d1Stock"></span></div>
<div class="stock-card">🟡 مازوت2 <span id="d2Stock"></span></div>

<div class="display" id="display">0</div>

<div class="pumps">
<div class="pump petrol" onclick="selectPump(1,'بنزين',58.97)">⛽ بنزين 1</div>
<div class="pump petrol" onclick="selectPump(2,'بنزين',58.97)">⛽ بنزين 2</div>
<div class="pump diesel" onclick="selectPump(3,'ديزل',56.35)">⛽ ديزل 1</div>
<div class="pump diesel" onclick="selectPump(4,'ديزل',56.35)">⛽ ديزل 2</div>
</div>

<div class="keypad" id="keypad">
<button onclick="add(7)">7</button><button onclick="add(8)">8</button><button onclick="add(9)">9</button>
<button onclick="add(4)">4</button><button onclick="add(5)">5</button><button onclick="add(6)">6</button>
<button onclick="add(1)">1</button><button onclick="add(2)">2</button><button onclick="add(3)">3</button>
<button onclick="add(0)">0</button><button onclick="clearInput()">مسح</button>
</div>

<div class="actions">
<button class="btn green" onclick="startFuel()">ابدأ</button>
<button class="btn" onclick="openReport()">📊</button>
<button class="btn red" onclick="cancel()">إلغاء</button>
</div>

</div>

<!-- REPORT -->
<div class="modal" id="reportModal">
<div class="modal-box">
<h3>📊 تقرير</h3>
<div id="reportBox"></div>

<canvas id="barChart" height="200"></canvas>
<canvas id="pieChart" height="200"></canvas>
<canvas id="lineChart" height="200"></canvas>

<button onclick="closeReport()">إغلاق</button>
</div>
</div>

<script>

/* Firebase */
const firebaseConfig = {
  apiKey: "AIzaSyA7pNxijt03_TzDDNnwFbqhyUU-zcbJiq4",
  authDomain: "pkka7-a75c0.firebaseapp.com",
  databaseURL: "https://pkka7-a75c0-default-rtdb.firebaseio.com",
  projectId: "pkka7-a75c0",
  storageBucket: "pkka7-a75c0.firebasestorage.app",
  messagingSenderId: "730135985362",
  appId: "1:730135985362:web:8cf4bfd291e36e936d010b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* DATA */
let petrol=0,d1=0,d2=0,logs=[];

/* تحميل مباشر */
db.ref("stock").on("value", s=>{
 let data=s.val();
 if(data){
  petrol=data.petrol;
  d1=data.d1;
  d2=data.d2;

  pStock.innerText=petrol;
  d1Stock.innerText=d1;
  d2Stock.innerText=d2;
 }
});

db.ref("logs").on("value", s=>{
 logs=[];
 s.forEach(c=>logs.unshift(c.val()));
});

/* pumps */
let pump=null,input="",type="",price=0;

function selectPump(p,t,pr){
 pump=p;type=t;price=pr;
 keypad.style.display="grid";
}

function add(n){input+=n;display.innerText=input;}
function clearInput(){input="";display.innerText="0";}

/* start */
function startFuel(){
 let l=parseFloat(input||0);

 if(type==="بنزين"){if(l>petrol)return;petrol-=l;}
 else{if(pump==3){if(l>d1)return;d1-=l;}else{if(l>d2)return;d2-=l;}}

 db.ref("stock").set({petrol,d1,d2});

 let cost=l*price;
 db.ref("logs").push("admin|"+cost);

 input="";display.innerText="0";keypad.style.display="none";
}

/* report */
let barChart,pieChart,lineChart;

function openReport(){

 let total=0,admin=0,cash=0,sales=[];

 logs.forEach(l=>{
  let p=l.split("|");
  let u=p[0],v=parseFloat(p[1]);

  total+=v;sales.push(v);
  if(u==="admin")admin+=v;
  if(u==="cash")cash+=v;
 });

 reportBox.innerHTML=`العمليات:${logs.length}<br>الإجمالي:${total}`;

 if(barChart)barChart.destroy();
 if(pieChart)pieChart.destroy();
 if(lineChart)lineChart.destroy();

 barChart=new Chart(barChart=document.getElementById("barChart"),{
  type:"bar",
  data:{labels:["admin","cash"],datasets:[{data:[admin,cash]}]}
 });

 pieChart=new Chart(document.getElementById("pieChart"),{
  type:"pie",
  data:{labels:["admin","cash"],datasets:[{data:[admin,cash]}]}
 });

 lineChart=new Chart(document.getElementById("lineChart"),{
  type:"line",
  data:{labels:sales.map((_,i)=>i+1),datasets:[{data:sales}]}
 });

 reportModal.style.display="block";
}

function closeReport(){reportModal.style.display="none";}

function cancel(){
 input="";display.innerText="0";keypad.style.display="none";
}

</script>

</body>
</html>
