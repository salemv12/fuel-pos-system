<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Fuel Pro Ultimate</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<!-- Charts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#f1f5f9;direction:rtl;margin:0}
.container{padding:15px}
.card{background:#c9a24b;color:white;padding:20px;border-radius:20px;text-align:center}

#loginBox{
 position:fixed;top:0;left:0;width:100%;height:100%;
 background:#000000cc;display:flex;justify-content:center;align-items:center;
}
.login-card{background:white;padding:30px;border-radius:20px;width:300px;text-align:center}
.login-card input{width:100%;padding:10px;margin:10px 0}

.pumps{display:grid;grid-template-columns:repeat(2,1fr);gap:15px}
.pump{padding:60px;font-size:25px;border-radius:20px;text-align:center}
.petrol{background:#22c55e;color:white}
.diesel{background:#facc15}

.keypad{display:none;grid-template-columns:repeat(3,1fr);gap:10px}
.keypad button{padding:25px;font-size:25px;color:#000}

#adminBox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000000cc}
.admin-card{background:white;margin:20px;padding:20px;border-radius:20px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<div class="login-card">
<h2>🔐 تسجيل الدخول</h2>

<input id="username" placeholder="اسم المستخدم">
<input id="password" type="password" placeholder="كلمة المرور">

<button onclick="login()">دخول</button>
<button onclick="register()">إنشاء حساب</button>

</div>
</div>

<div class="container">

<div class="card">⛽ Fuel Pro Ultimate</div>

<div id="display">0</div>

<div class="pumps">
<div class="pump petrol" onclick="selectPump(1,'بنزين',58.97)">⛽ بنزين</div>
<div class="pump diesel" onclick="selectPump(2,'ديزل',56.35)">⛽ ديزل</div>
</div>

<div class="keypad" id="keypad">
<button onclick="add(1)">1</button>
<button onclick="add(2)">2</button>
<button onclick="add(3)">3</button>
<button onclick="add(4)">4</button>
<button onclick="add(5)">5</button>
<button onclick="add(6)">6</button>
<button onclick="add(7)">7</button>
<button onclick="add(8)">8</button>
<button onclick="add(9)">9</button>
<button onclick="add(0)">0</button>
<button onclick="clearInput()">⌫</button>
</div>

<button onclick="startFuel()">ابدأ</button>
<button onclick="openAdmin()">🧑‍💼 المدير</button>

</div>

<!-- ADMIN -->
<div id="adminBox">
<div class="admin-card">
<h2>📊 لوحة المدير</h2>
<canvas id="chart1"></canvas>
<canvas id="chart2"></canvas>
<button onclick="closeAdmin()">إغلاق</button>
</div>
</div>

<script>

/* Firebase */
const firebaseConfig = {
  apiKey: "AIzaSyA7pNxijt03_TzDDNnwFbqhyUU-zcbJiq4",
  authDomain: "pkka7-a75c0.firebaseapp.com",
  databaseURL: "https://pkka7-a75c0-default-rtdb.firebaseio.com",
  projectId: "pkka7-a75c0",
  storageBucket: "pkka7-a75c0.appspot.com",
  messagingSenderId: "730135985362",
  appId: "1:730135985362:web:8cf4bfd291e36e936d010b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* user */
let currentUser = "";

/* register */
function register(){
 let user = username.value;
 let pass = password.value;

 if(!user || !pass) return alert("ادخل البيانات");

 db.ref("users/" + user).once("value").then(s=>{
  if(s.exists()){
   alert("المستخدم موجود");
  }else{
   db.ref("users/" + user).set({
    password: pass
   });
   alert("تم إنشاء الحساب");
  }
 });
}

/* login */
function login(){
 let user = username.value;
 let pass = password.value;

 if(!user || !pass) return alert("ادخل البيانات");

 db.ref("users/" + user).once("value").then(s=>{
  if(!s.exists()){
   alert("المستخدم غير موجود");
  }else{
   if(s.val().password === pass){
    currentUser = user;
    loginBox.style.display="none";
   }else{
    alert("كلمة المرور خطأ");
   }
  }
 });
}

/* data */
let logs=[];
let pump,type,price,input="";

/* load logs */
db.ref("logs").on("value",s=>{
 logs=[];
 s.forEach(c=>logs.unshift(c.val()));
});

/* keypad */
function selectPump(p,t,pr){
 pump=p;type=t;price=pr;
 keypad.style.display="grid";
}
function add(n){input+=n;display.innerText=input;}
function clearInput(){input="";display.innerText="0";}

/* start */
function startFuel(){
 let money=parseFloat(input||0);
 if(!money)return;

 db.ref("logs").push({
  type:type,
  amount:money,
  user:currentUser
 });

 input="";display.innerText="0";keypad.style.display="none";
}

/* admin */
function openAdmin(){

 let total=0;
 let users={};

 logs.forEach(l=>{
  total+=l.amount;

  if(!users[l.user]) users[l.user]=0;
  users[l.user]+=l.amount;
 });

 let labels=Object.keys(users);
 let data=Object.values(users);

 new Chart(chart1,{
  type:'bar',
  data:{labels:labels,datasets:[{data:data}]}
 });

 new Chart(chart2,{
  type:'pie',
  data:{labels:labels,datasets:[{data:data}]}
 });

 adminBox.style.display="block";
}

function closeAdmin(){
 adminBox.style.display="none";
}

</script>

</body>
</html>
