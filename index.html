<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نظام محطة الوقود</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0a2540;
  color:white;
  direction: rtl;
}

.container {
  display:flex;
  height:100vh;
}

/* LEFT */
.left {
  width:30%;
  background:#133b5c;
  padding:10px;
}

.bill {
  background:#0a2540;
  height:60%;
  padding:10px;
  overflow:auto;
  border-radius:10px;
}

.total {
  margin-top:10px;
  font-size:20px;
}

.pay {
  width:100%;
  padding:15px;
  background:#16a34a;
  border:none;
  border-radius:10px;
  margin-top:10px;
}

/* CENTER */
.center {
  width:40%;
  padding:10px;
}

/* شاشة */
.display {
  background:#000;
  padding:20px;
  font-size:32px;
  text-align:center;
  border-radius:15px;
  margin-bottom:15px;
  letter-spacing:2px;
}

/* مضخات */
.pumps {
  display:grid;
  grid-template-columns: repeat(2,1fr);
  gap:15px;
}

.pump {
  background:#1e5f8a;
  padding:20px;
  text-align:center;
  border-radius:20px;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.pump:hover {
  transform:translateY(-5px);
}

.pump img {
  width:70px;
  margin-bottom:10px;
}

.pump.active {
  background:#22c55e;
}

/* KEYPAD */
.keypad {
  margin-top:20px;
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:10px;
}

.keypad button {
  padding:20px;
  font-size:20px;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:white;
  font-weight:bold;
  transition:0.2s;
}

.keypad button:active {
  transform:scale(0.9);
  background:#1d4ed8;
}

/* RIGHT */
.right {
  width:30%;
  padding:10px;
}

.btn {
  width:100%;
  padding:15px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  font-size:18px;
  font-weight:bold;
  transition:0.2s;
}

.btn:active {
  transform:scale(0.95);
}

.green {background:#16a34a;}
.red {background:#dc2626;}
.gray {background:#3b82f6;}

</style>
</head>

<body>

<!-- 🔊 صوت -->
<audio id="clickSound" preload="auto">
  <source src="https://www.soundjay.com/buttons/sounds/button-16.mp3" type="audio/mpeg">
</audio>

<div class="container">

<!-- LEFT -->
<div class="left">
<h3>الفاتورة</h3>
<div class="bill" id="bill"></div>
<div class="total" id="total">المجموع: 0 أوقية</div>
<button class="pay" onclick="pay()">💳 دفع</button>
</div>

<!-- CENTER -->
<div class="center">
<h3>المضخات</h3>

<div class="display" id="display">0</div>

<div class="pumps">

<div class="pump" onclick="selectPump(this,1,'بنزين',58.97)">
<img src="https://cdn-icons-png.flaticon.com/512/684/684908.png">
<p>بنزين - مضخة 1</p>
</div>

<div class="pump" onclick="selectPump(this,2,'بنزين',58.97)">
<img src="https://cdn-icons-png.flaticon.com/512/684/684908.png">
<p>بنزين - مضخة 2</p>
</div>

<div class="pump" onclick="selectPump(this,3,'ديزل',56.35)">
<img src="https://cdn-icons-png.flaticon.com/512/684/684908.png">
<p>ديزل - مضخة 3</p>
</div>

<div class="pump" onclick="selectPump(this,4,'ديزل',56.35)">
<img src="https://cdn-icons-png.flaticon.com/512/684/684908.png">
<p>ديزل - مضخة 4</p>
</div>

</div>

<div class="keypad">
<button onclick="add(7)">7</button>
<button onclick="add(8)">8</button>
<button onclick="add(9)">9</button>
<button onclick="add(4)">4</button>
<button onclick="add(5)">5</button>
<button onclick="add(6)">6</button>
<button onclick="add(1)">1</button>
<button onclick="add(2)">2</button>
<button onclick="add(3)">3</button>
<button onclick="add(0)">0</button>
<button onclick="clearInput()">مسح</button>
</div>

</div>

<!-- RIGHT -->
<div class="right">
<button class="btn green" onclick="startFuel()">ابدأ الضخ</button>
<button class="btn gray">دفع مسبق</button>
<button class="btn gray">تحويل</button>
<button class="btn red">إيقاف</button>
<button class="btn red" onclick="cancel()">إلغاء</button>
</div>

</div>

<script>

let pump = null;
let input = "";
let total = 0;
let fuelType = "";
let pricePerLiter = 0;

function selectPump(el, p, type, price){
  document.querySelectorAll(".pump").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");

  pump = p;
  fuelType = type;
  pricePerLiter = price;
}

function add(n){
  input += n;
  document.getElementById("display").innerText = input;

  let sound = document.getElementById("clickSound");
  sound.pause();
  sound.currentTime = 0;
  sound.play().catch(()=>{});
}

function clearInput(){
  input = "";
  document.getElementById("display").innerText = "0";
}

function startFuel(){
  if(!pump) return alert("اختر مضخة");

  let liters = parseFloat(input || 0);
  let cost = liters * pricePerLiter;
  total += cost;

  document.getElementById("bill").innerHTML +=
    `<p>${fuelType} - مضخة ${pump} - ${liters} لتر = ${cost.toFixed(2)} أوقية</p>`;

  document.getElementById("total").innerText =
    "المجموع: " + total.toFixed(2) + " أوقية";

  input = "";
  document.getElementById("display").innerText = "0";
}

function pay(){
  alert("تم الدفع: " + total.toFixed(2) + " أوقية");
  location.reload();
}

function cancel(){
  location.reload();
}

</script>

</body>
</html>
