<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نظام محطة الوقود</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0a2540;
  color:white;
  direction: rtl;
}

.container {display:flex;height:100vh;}
.center {width:100%;padding:15px;}

/* زر موحد */
.uniform-btn {
  width:100%;
  height:70px;
  font-size:18px;
  border-radius:12px;
  font-weight:bold;
  display:flex;
  align-items:center;
  justify-content:center;
  border:none;
  cursor:pointer;
  color:white;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.uniform-btn:active {
  transform:scale(0.95);
}

/* الألوان */
.green{background:#22c55e;}
.gray{background:#3b82f6;}
.red{background:#ef4444;}
.blue{background:#2563eb;}
.pumpColor{background:#1e5f8a;}

/* الخزانات */
.tanks {
  background:#0f3b5f;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

/* الشاشة */
.display {
  background:#000;
  padding:20px;
  font-size:36px;
  text-align:center;
  border-radius:15px;
  margin-bottom:10px;
  color:#00ffcc;
}

/* المضخات */
.pumps {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

/* الأرقام */
.keypad {
  margin-top:10px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

/* الأزرار السفلية */
.actions {
  margin-top:15px;
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:10px;
}

/* نافذة السجل */
#billModal {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:85%;
  height:70%;
  background:#0f3b5f;
  border-radius:15px;
  padding:15px;
  display:none;
  flex-direction:column;
  z-index:999;
}
</style>
</head>

<body>

<div class="container">
<div class="center">

<!-- الخزانات -->
<div class="tanks">
<p id="tankPetrol">خزان البنزين: 2000 لتر</p>
<button class="uniform-btn green" onclick="refill('petrol')">+ تعبئة البنزين</button>

<p id="tankDiesel1">مازوت خزان 1: 1000 لتر</p>
<button class="uniform-btn gray" onclick="refill('diesel1')">+ تعبئة مازوت 1</button>

<p id="tankDiesel2">مازوت خزان 2: 1000 لتر</p>
<button class="uniform-btn gray" onclick="refill('diesel2')">+ تعبئة مازوت 2</button>
</div>

<!-- الشاشة -->
<div class="display" id="display">0</div>

<!-- المضخات -->
<div class="pumps">
<div class="uniform-btn pumpColor" onclick="selectPump(this,1,'بنزين',58.97)">بنزين 1</div>
<div class="uniform-btn pumpColor" onclick="selectPump(this,2,'بنزين',58.97)">بنزين 2</div>
<div class="uniform-btn pumpColor" onclick="selectPump(this,3,'ديزل1',56.35)">ديزل 1</div>
<div class="uniform-btn pumpColor" onclick="selectPump(this,4,'ديزل2',56.35)">ديزل 2</div>
</div>

<!-- الأرقام -->
<div class="keypad">
<button class="uniform-btn blue" onclick="add(7)">7</button>
<button class="uniform-btn blue" onclick="add(8)">8</button>
<button class="uniform-btn blue" onclick="add(9)">9</button>
<button class="uniform-btn blue" onclick="add(4)">4</button>
<button class="uniform-btn blue" onclick="add(5)">5</button>
<button class="uniform-btn blue" onclick="add(6)">6</button>
<button class="uniform-btn blue" onclick="add(1)">1</button>
<button class="uniform-btn blue" onclick="add(2)">2</button>
<button class="uniform-btn blue" onclick="add(3)">3</button>
<button class="uniform-btn blue" onclick="add(0)">0</button>
<button class="uniform-btn red" onclick="clearInput()">مسح</button>
</div>

<!-- الأزرار -->
<div class="actions">
  <button class="uniform-btn green" onclick="startFuel()">ابدأ</button>
  <button class="uniform-btn gray" onclick="toggleBill()">📋 السجل</button>
  <button class="uniform-btn red" onclick="cancel()">إلغاء</button>
</div>

</div>
</div>

<!-- نافذة السجل -->
<div id="billModal">
<h3>السجل</h3>

<div id="bill" style="
flex:1;
overflow:auto;
background:#0a2540;
padding:10px;
border-radius:10px;
margin-bottom:10px;
"></div>

<div id="total">المجموع: 0 أوقية</div>

<button onclick="toggleBill()" class="uniform-btn red">إغلاق</button>
</div>

<script>

// صوت
const ctx=new (window.AudioContext||window.webkitAudioContext)();
function beep(){
 let o=ctx.createOscillator(),g=ctx.createGain();
 o.connect(g);g.connect(ctx.destination);
 o.frequency.value=800;g.gain.value=0.1;
 o.start();o.stop(ctx.currentTime+0.05);
}

// خزانات
let petrolTank=2000;
let diesel1=1000;
let diesel2=1000;

// النظام
let pump=null,input="",total=0,type="",price=0;

function selectPump(el,p,t,pr){
 document.querySelectorAll(".pumpColor").forEach(x=>x.classList.remove("green"));
 el.classList.add("green");
 pump=p;type=t;price=pr;
}

function add(n){
 input+=n;
 document.getElementById("display").innerText=input;
 beep();
}

function clearInput(){
 input="";
 document.getElementById("display").innerText="0";
}

function refill(type){
 let amount=prompt("كم لتر تريد إضافته؟");
 amount=parseFloat(amount);
 if(isNaN(amount)) return;

 if(type==="petrol")petrolTank+=amount;
 if(type==="diesel1")diesel1+=amount;
 if(type==="diesel2")diesel2+=amount;

 updateUI();
}

function updateUI(){
 document.getElementById("tankPetrol").innerText="خزان البنزين: "+petrolTank.toFixed(2);
 document.getElementById("tankDiesel1").innerText="مازوت خزان 1: "+diesel1.toFixed(2);
 document.getElementById("tankDiesel2").innerText="مازوت خزان 2: "+diesel2.toFixed(2);
}

function startFuel(){
 if(!pump)return alert("اختر مضخة");

 let liters=parseFloat(input||0);

 if(type==="بنزين"){ if(liters>petrolTank)return alert("بنزين قليل"); petrolTank-=liters; }
 if(type==="ديزل1"){ if(liters>diesel1)return alert("مازوت قليل"); diesel1-=liters; }
 if(type==="ديزل2"){ if(liters>diesel2)return alert("مازوت قليل"); diesel2-=liters; }

 updateUI();

 let cost=liters*price;
 total+=cost;

 document.getElementById("bill").innerHTML+=
 `<p>${type} - ${liters} لتر = ${cost.toFixed(2)} أوقية</p>`;

 document.getElementById("total").innerText="المجموع: "+total.toFixed(2)+" أوقية";

 input="";
 document.getElementById("display").innerText="0";
}

function toggleBill(){
 let modal=document.getElementById("billModal");
 modal.style.display = modal.style.display==="flex" ? "none" : "flex";
}

function cancel(){
 location.reload();
}

</script>

</body>
</html>
