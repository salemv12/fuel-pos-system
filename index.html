<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Fuel Pro Cloud</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body{
 font-family:Arial;
 background:#f1f5f9;
 direction:rtl;
 margin:0;
}

/* 🔐 LOGIN */
#loginBox{
 position:fixed;
 top:0;left:0;width:100%;height:100%;
 background:#000000cc;
 display:flex;
 justify-content:center;
 align-items:center;
}
.login-card{
 background:white;
 padding:40px;
 border-radius:25px;
 width:320px;
 text-align:center;
}
.login-card input{
 width:100%;
 padding:15px;
 margin:10px 0;
 font-size:20px;
}
.login-card button{
 width:100%;
 padding:18px;
 font-size:20px;
 background:#c9a24b;
 color:white;
 border:none;
 border-radius:15px;
}

/* UI */
.container{padding:15px}
.card{
 background:linear-gradient(135deg,#c9a24b,#a67c2d);
 color:white;
 padding:20px;
 border-radius:20px;
 font-size:22px;
 text-align:center;
}

/* stock */
.stock{
 background:white;
 padding:15px;
 margin-top:10px;
 border-radius:15px;
 display:flex;
 justify-content:space-between;
 align-items:center;
 font-size:20px;
}
.stock button{
 background:#22c55e;
 color:white;
 border:none;
 padding:10px 15px;
 border-radius:10px;
 font-size:16px;
}

/* display */
.display{
 background:white;
 padding:30px;
 font-size:40px;
 text-align:center;
 margin:15px 0;
 border-radius:15px;
 color:#c9a24b;
 font-weight:bold;
}

/* 🔥 pumps BIG */
.pumps{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:20px;
}

.pump{
 padding:60px;
 font-size:26px;
 border-radius:25px;
 text-align:center;
 font-weight:bold;
 box-shadow:0 8px 20px rgba(0,0,0,0.2);
 cursor:pointer;
 transition:0.3s;
}

.pump:active{
 transform:scale(0.95);
}

.petrol{background:#22c55e;color:white}
.diesel{background:#facc15}

/* keypad BIG */
.keypad{
 display:none;
 grid-template-columns:repeat(3,1fr);
 gap:15px;
 margin-top:15px;
}

.keypad button{
 padding:25px;
 font-size:22px;
 border-radius:15px;
 border:none;
 background:#e5e7eb;
}

/* actions BIG */
.actions{
 display:grid;
 grid-template-columns:repeat(3,1fr);
 gap:15px;
 margin-top:15px;
}

.btn{
 padding:20px;
 font-size:20px;
 border:none;
 border-radius:15px;
 font-weight:bold;
}

.green{background:#c9a24b;color:white}
.red{background:#ef4444;color:white}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<div class="login-card">
<h2>🔐 تسجيل الدخول</h2>
<input id="user" placeholder="اسم المستخدم">
<input id="pass" type="password" placeholder="كلمة المرور">
<button onclick="login()">دخول</button>
</div>
</div>

<div class="container">

<div class="card">⛽ Fuel Pro Cloud</div>

<div class="stock">⛽ بنزين <span id="pStock"></span> <button onclick="addStock('petrol')">+</button></div>
<div class="stock">🟡 مازوت1 <span id="d1Stock"></span> <button onclick="addStock('d1')">+</button></div>
<div class="stock">🟡 مازوت2 <span id="d2Stock"></span> <button onclick="addStock('d2')">+</button></div>

<div class="display" id="display">0</div>

<div class="pumps">
<div class="pump petrol" onclick="selectPump(1,'بنزين',58.97)">⛽ بنزين 1</div>
<div class="pump petrol" onclick="selectPump(2,'بنزين',58.97)">⛽ بنزين 2</div>
<div class="pump diesel" onclick="selectPump(3,'ديزل',56.35)">⛽ ديزل 1</div>
<div class="pump diesel" onclick="selectPump(4,'ديزل',56.35)">⛽ ديزل 2</div>
</div>

<div class="keypad" id="keypad">
<button onclick="add(7)">7</button><button onclick="add(8)">8</button><button onclick="add(9)">9</button>
<button onclick="add(4)">4</button><button onclick="add(5)">5</button><button onclick="add(6)">6</button>
<button onclick="add(1)">1</button><button onclick="add(2)">2</button><button onclick="add(3)">3</button>
<button onclick="add(0)">0</button><button onclick="clearInput()">مسح</button>
</div>

<div class="actions">
<button class="btn green" onclick="startFuel()">ابدأ</button>
<button class="btn" onclick="openLog()">📋</button>
<button class="btn red" onclick="cancel()">إلغاء</button>
</div>

</div>

<script>

/* Firebase */
const firebaseConfig = {
 apiKey: "AIzaSyA7pNxijt03_TzDDNnwFbqhyUU-zcbJiq4",
 authDomain: "pkka7-a75c0.firebaseapp.com",
 databaseURL: "https://pkka7-a75c0-default-rtdb.firebaseio.com",
 projectId: "pkka7-a75c0",
 storageBucket: "pkka7-a75c0.firebasestorage.app",
 messagingSenderId: "730135985362",
 appId: "1:730135985362:web:8cf4bfd291e36e936d010b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* login */
function login(){
 if(user.value==="admin" && pass.value==="1234"){
  loginBox.style.display="none";
 }else alert("خطأ");
}

/* data */
let petrol=0,d1=0,d2=0,logs=[];
let pump=null,input="",type="",price=0;

/* init */
db.ref("stock").once("value").then(s=>{
 if(!s.exists()){
  db.ref("stock").set({petrol:2000,d1:1000,d2:1000});
 }
});

/* load */
db.ref("stock").on("value", s=>{
 let d=s.val();
 if(d){
  petrol=d.petrol;
  d1=d.d1;
  d2=d.d2;
  pStock.innerText=petrol;
  d1Stock.innerText=d1;
  d2Stock.innerText=d2;
 }
});

db.ref("logs").on("value", s=>{
 logs=[];
 s.forEach(c=>logs.unshift(c.val()));
});

/* add stock */
function addStock(t){
 let val=parseFloat(prompt("كم تريد إضافة؟"));
 if(!val)return;

 if(t==="petrol")petrol+=val;
 if(t==="d1")d1+=val;
 if(t==="d2")d2+=val;

 db.ref("stock").set({petrol,d1,d2});
}

/* pumps */
function selectPump(p,t,pr){
 pump=p;type=t;price=pr;
 keypad.style.display="grid";
}

function add(n){input+=n;display.innerText=input;}
function clearInput(){input="";display.innerText="0";}

/* start */
function startFuel(){
 let l=parseFloat(input||0);
 if(!l)return;

 if(type==="بنزين"){if(l>petrol)return;petrol-=l;}
 else{
  if(pump==3){if(l>d1)return;d1-=l;}
  else{if(l>d2)return;d2-=l;}
 }

 db.ref("stock").set({petrol,d1,d2});

 let cost=l*price;

 db.ref("logs").push({
  type:type,
  pump:pump,
  liters:l,
  amount:cost
 });

 input="";
 display.innerText="0";
 keypad.style.display="none";
}

/* log */
function openLog(){
 let txt="";
 logs.forEach(l=>{
  txt+=`${l.type} - ${l.liters}L = ${l.amount}\n`;
 });
 alert(txt||"لا يوجد سجل");
}

function cancel(){
 input="";
 display.innerText="0";
 keypad.style.display="none";
}

</script>

</body>
</html>
