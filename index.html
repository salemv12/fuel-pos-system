<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Fuel Pro Ultimate</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body{font-family:Arial;background:#f1f5f9;direction:rtl;margin:0}
.container{padding:15px}
.card{background:#c9a24b;color:white;padding:20px;border-radius:20px;text-align:center}

/* LOGIN */
#loginBox{
 position:fixed;top:0;left:0;width:100%;height:100%;
 background:#000000cc;display:flex;justify-content:center;align-items:center;
}
.login-card{background:white;padding:30px;border-radius:20px;width:300px;text-align:center}
.login-card input{width:100%;padding:10px;margin:10px 0}

/* pumps */
.pumps{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;margin-top:10px}
.pump{padding:50px;font-size:22px;border-radius:20px;text-align:center}
.petrol{background:#22c55e;color:white}
.diesel{background:#facc15}

/* display */
#display{
 background:#000;
 color:#00ff88;
 font-size:80px;
 text-align:center;
 padding:30px;
 border-radius:25px;
 margin:20px 0;
 font-weight:bold;
 box-shadow:0 0 25px #00ff88;
 display:flex;
 align-items:center;
 justify-content:center;
 font-family:'Orbitron', sans-serif;
}

/* keypad */
.keypad{display:none;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
.keypad button{padding:25px;font-size:22px}

/* buttons */
.actions{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:15px;
 margin-top:15px;
}
.big-btn{
 font-size:24px;
 padding:20px;
 border:none;
 border-radius:20px;
 font-weight:bold;
}
.start{background:#22c55e;color:white}
.logs{background:#3b82f6;color:white}

/* logs */
#logsModal{
 display:none;
 position:fixed;
 top:0;left:0;width:100%;height:100%;
 background:#000000cc;
}
.modal{
 background:white;
 margin:20px;
 padding:20px;
 border-radius:20px;
 max-height:90vh;
 overflow:auto;
}
.close-btn{
 width:100%;
 margin-top:20px;
 padding:15px;
 font-size:20px;
 background:#ef4444;
 color:white;
 border:none;
 border-radius:15px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<div class="login-card">
<h2>🔐 تسجيل الدخول</h2>
<input id="username" placeholder="اسم المستخدم">
<input id="password" type="password" placeholder="كلمة المرور">
<button onclick="login()">دخول</button>
<button onclick="register()">إنشاء حساب</button>
</div>
</div>

<div class="container">

<div class="card">⛽ Fuel Pro Ultimate</div>

<div id="stockBox"></div>

<!-- pumps -->
<div class="pumps">
<div class="pump petrol" onclick="selectPump('petrol','بنزين 1',58.97)">⛽ بنزين 1</div>
<div class="pump petrol" onclick="selectPump('petrol','بنزين 2',58.97)">⛽ بنزين 2</div>
<div class="pump diesel" onclick="selectPump('diesel1','ديزل 1',56.35)">🟡 ديزل 1</div>
<div class="pump diesel" onclick="selectPump('diesel2','ديزل 2',56.35)">🟡 ديزل 2</div>
</div>

<!-- display -->
<div id="display">0</div>

<!-- keypad -->
<div class="keypad" id="keypad">
<button onclick="add(1)">1</button>
<button onclick="add(2)">2</button>
<button onclick="add(3)">3</button>
<button onclick="add(4)">4</button>
<button onclick="add(5)">5</button>
<button onclick="add(6)">6</button>
<button onclick="add(7)">7</button>
<button onclick="add(8)">8</button>
<button onclick="add(9)">9</button>
<button onclick="add(0)">0</button>
<button onclick="clearInput()">⌫</button>
</div>

<!-- buttons -->
<div class="actions">
<button class="big-btn start" onclick="startFuel()">⛽ ابدأ</button>
<button class="big-btn logs" onclick="showLogs()">📄 السجل</button>
</div>

</div>

<!-- logs -->
<div id="logsModal">
<div class="modal">
<h3 style="text-align:center;font-size:28px">📊 السجل</h3>
<div id="logsBox"></div>
<button class="close-btn" onclick="closeLogs()">❌ إغلاق</button>
</div>
</div>

<script>

/* Firebase */
const firebaseConfig = {
 apiKey:"AIzaSyA7pNxijt03_TzDDNnwFbqhyUU-zcbJiq4",
 databaseURL:"https://pkka7-a75c0-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

/* عناصر */
const logsModal = document.getElementById("logsModal");
const logsBox = document.getElementById("logsBox");
const display = document.getElementById("display");

/* المستخدم */
let currentUser="";

/* تسجيل */
function register(){
 db.ref("users/"+username.value).set({password:password.value});
 alert("تم إنشاء الحساب");
}

/* دخول */
function login(){
 db.ref("users/"+username.value).once("value").then(s=>{
  if(s.exists() && s.val().password===password.value){
   currentUser=username.value;
   loginBox.style.display="none";
  }else{
   alert("خطأ في البيانات");
  }
 });
}

/* المخزون */
let stock={petrol:1000,diesel1:1000,diesel2:1000};

db.ref("stock").on("value",s=>{
 if(s.exists()) stock=s.val();
 stockBox.innerHTML=`⛽ ${stock.petrol} | 🟡 ${stock.diesel1} | 🟡 ${stock.diesel2}`;
});

/* الإدخال */
let type="",pumpName="",price=0,input="";

function selectPump(t,name,p){
 type=t;
 pumpName=name;
 price=p;
 keypad.style.display="grid";
}

function add(n){
 input+=n;
 display.innerText=input;
}

function clearInput(){
 input="";
 display.innerText="0";
}

/* التشغيل */
function startFuel(){

 let money=parseFloat(input||0);
 if(!money)return;

 let liters=money/price;

 if(type=="petrol") stock.petrol-=liters;
 if(type=="diesel1") stock.diesel1-=liters;
 if(type=="diesel2") stock.diesel2-=liters;

 db.ref("stock").set(stock);

 db.ref("logs").push({
  type:pumpName,
  amount:money,
  liters:liters,
  user:currentUser || "غير معروف",
  date:new Date().toLocaleString()
 });

 // ❗ لا نمسح الشاشة
 input="";
 keypad.style.display="none";
}

/* السجل */
function showLogs(){
 db.ref("logs").once("value").then(s=>{
  let html="";
  s.forEach(c=>{
   let d=c.val();

   html+=`
   <div style="background:#f1f5f9;padding:10px;margin:8px 0;border-radius:10px">
   👤 ${d.user}<br>
   ⛽ ${d.type}<br>
   💰 ${d.amount} MRU<br>
   🕒 ${d.date}
   </div>
   `;
  });

  logsBox.innerHTML=html;
 });

 logsModal.style.display="block";
}

function closeLogs(){
 logsModal.style.display="none";
}

</script>

</body>
</html>
