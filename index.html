<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نظام محطة الوقود</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b132b;
  color:white;
  direction: rtl;
}

.container {
  display:flex;
  height:100vh;
}

/* LEFT */
.left {
  width:30%;
  background:#1c2541;
  padding:10px;
}

.bill {
  background:#0b132b;
  height:60%;
  padding:10px;
  overflow:auto;
  border-radius:10px;
}

.total {
  margin-top:10px;
  font-size:20px;
}

.pay {
  width:100%;
  padding:15px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  margin-top:10px;
}

/* CENTER */
.center {
  width:40%;
  padding:10px;
}

.pumps {
  display:grid;
  grid-template-columns: repeat(2,1fr);
  gap:15px;
}

.pump {
  background:#3a506b;
  padding:15px;
  text-align:center;
  border-radius:15px;
  cursor:pointer;
}

.pump img {
  width:60px;
  margin-bottom:10px;
}

.pump.active {
  background:#22c55e;
}

/* KEYPAD */
.keypad {
  margin-top:20px;
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:10px;
}

.keypad button {
  padding:20px;
  font-size:18px;
  border:none;
  border-radius:10px;
}

/* RIGHT */
.right {
  width:30%;
  padding:10px;
}

.btn {
  width:100%;
  padding:15px;
  margin:5px 0;
  border:none;
  border-radius:10px;
  font-size:18px;
}

.green {background:#22c55e;}
.red {background:#ef4444;}
.gray {background:#475569;}

</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="left">
<h3>الفاتورة</h3>
<div class="bill" id="bill"></div>
<div class="total" id="total">المجموع: 0 أوقية</div>
<button class="pay" onclick="pay()">💳 دفع</button>
</div>

<!-- CENTER -->
<div class="center">
<h3>المضخات</h3>

<div class="pumps">

<div class="pump" onclick="selectPump(this,1,'بنزين',58.97)">
<img src="https://cdn-icons-png.flaticon.com/512/2972/2972185.png">
<p>بنزين - مضخة 1</p>
</div>

<div class="pump" onclick="selectPump(this,2,'بنزين',58.97)">
<img src="https://cdn-icons-png.flaticon.com/512/2972/2972185.png">
<p>بنزين - مضخة 2</p>
</div>

<div class="pump" onclick="selectPump(this,3,'ديزل',56.35)">
<img src="https://cdn-icons-png.flaticon.com/512/2972/2972185.png">
<p>ديزل - مضخة 3</p>
</div>

<div class="pump" onclick="selectPump(this,4,'ديزل',56.35)">
<img src="https://cdn-icons-png.flaticon.com/512/2972/2972185.png">
<p>ديزل - مضخة 4</p>
</div>

</div>

<div class="keypad">
<button onclick="add(7)">٧</button>
<button onclick="add(8)">٨</button>
<button onclick="add(9)">٩</button>
<button onclick="add(4)">٤</button>
<button onclick="add(5)">٥</button>
<button onclick="add(6)">٦</button>
<button onclick="add(1)">١</button>
<button onclick="add(2)">٢</button>
<button onclick="add(3)">٣</button>
<button onclick="add(0)">٠</button>
<button onclick="clearInput()">مسح</button>
</div>
</div>

<!-- RIGHT -->
<div class="right">
<button class="btn green" onclick="startFuel()">ابدأ الضخ</button>
<button class="btn gray">دفع مسبق</button>
<button class="btn gray">تحويل</button>
<button class="btn red">إيقاف</button>
<button class="btn red" onclick="cancel()">إلغاء</button>
</div>

</div>

<script>

let pump = null;
let input = "";
let total = 0;
let fuelType = "";
let pricePerLiter = 0;

function selectPump(el, p, type, price){
  document.querySelectorAll(".pump").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");

  pump = p;
  fuelType = type;
  pricePerLiter = price;
}

function add(n){
  input += n;
}

function clearInput(){
  input = "";
}

function startFuel(){
  if(!pump) return alert("اختر مضخة");

  let liters = parseFloat(input || 0);
  let cost = liters * pricePerLiter;
  total += cost;

  document.getElementById("bill").innerHTML +=
    `<p>${fuelType} - مضخة ${pump} - ${liters} لتر = ${cost.toFixed(2)} أوقية</p>`;

  document.getElementById("total").innerText =
    "المجموع: " + total.toFixed(2) + " أوقية";

  input = "";
}

function pay(){
  alert("تم الدفع: " + total.toFixed(2) + " أوقية");
  location.reload();
}

function cancel(){
  location.reload();
}

</script>

</body>
</html>
