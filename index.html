<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Fuel Pro Ultimate</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body{font-family:Arial;background:#f1f5f9;direction:rtl;margin:0}
.container{padding:15px}
.card{background:#c9a24b;color:white;padding:20px;border-radius:20px;text-align:center}

#loginBox{
 position:fixed;top:0;left:0;width:100%;height:100%;
 background:#000000cc;display:flex;justify-content:center;align-items:center;
}
.login-card{background:white;padding:30px;border-radius:20px;width:300px;text-align:center}
.login-card input{width:100%;padding:10px;margin:10px 0}

.pumps{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;margin-top:10px}
.pump{padding:50px;font-size:22px;border-radius:20px;text-align:center}
.petrol{background:#22c55e;color:white}
.diesel{background:#facc15}

.keypad{display:none;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
.keypad button{padding:25px;font-size:22px;color:#000}

button{margin:5px;padding:10px;border:none;border-radius:10px}

#logsModal{
 display:none;position:fixed;top:0;left:0;width:100%;height:100%;
 background:#000000cc
}
.modal{
 background:white;margin:20px;padding:20px;border-radius:20px
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<div class="login-card">
<h2>🔐 تسجيل الدخول</h2>
<input id="username" placeholder="اسم المستخدم">
<input id="password" type="password" placeholder="كلمة المرور">
<button onclick="login()">دخول</button>
<button onclick="register()">إنشاء حساب</button>
</div>
</div>

<div class="container">

<div class="card">⛽ Fuel Pro Ultimate</div>

<div id="stockBox"></div>

<div id="display">0</div>

<!-- 🔥 4 مضخات -->
<div class="pumps">
<div class="pump petrol" onclick="selectPump('petrol','بنزين 1',58.97)">⛽ بنزين 1</div>
<div class="pump petrol" onclick="selectPump('petrol','بنزين 2',58.97)">⛽ بنزين 2</div>
<div class="pump diesel" onclick="selectPump('diesel1','ديزل 1',56.35)">🟡 ديزل 1</div>
<div class="pump diesel" onclick="selectPump('diesel2','ديزل 2',56.35)">🟡 ديزل 2</div>
</div>

<div class="keypad" id="keypad">
<button onclick="add(1)">1</button>
<button onclick="add(2)">2</button>
<button onclick="add(3)">3</button>
<button onclick="add(4)">4</button>
<button onclick="add(5)">5</button>
<button onclick="add(6)">6</button>
<button onclick="add(7)">7</button>
<button onclick="add(8)">8</button>
<button onclick="add(9)">9</button>
<button onclick="add(0)">0</button>
<button onclick="clearInput()">⌫</button>
</div>

<button onclick="startFuel()">ابدأ</button>
<button onclick="showLogs()">📄 السجل</button>

</div>

<!-- السجل -->
<div id="logsModal">
<div class="modal">
<h3>📊 السجل</h3>
<div id="logsBox"></div>
<button onclick="closeLogs()">إغلاق</button>
</div>
</div>

<script>

/* Firebase */
const firebaseConfig = {
 apiKey: "AIzaSyA7pNxijt03_TzDDNnwFbqhyUU-zcbJiq4",
 databaseURL: "https://pkka7-a75c0-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* المستخدم */
let currentUser = "";

/* تسجيل */
function register(){
 let user=username.value;
 let pass=password.value;

 if(!user || !pass) return alert("ادخل البيانات");

 db.ref("users/"+user).set({password:pass});
 alert("تم إنشاء الحساب");
}

/* دخول */
function login(){
 let user=username.value;
 let pass=password.value;

 db.ref("users/"+user).once("value").then(s=>{
  if(!s.exists()) return alert("المستخدم غير موجود");

  if(s.val().password===pass){
   currentUser=user;
   loginBox.style.display="none";
  }else{
   alert("كلمة المرور خطأ");
  }
 });
}

/* 🔥 المخزون */
let stock={
 petrol:1000,
 diesel1:1000,
 diesel2:1000
};

db.ref("stock").on("value",s=>{
 if(s.exists()) stock=s.val();
 updateStock();
});

function updateStock(){
 stockBox.innerHTML=
 `⛽ بنزين: ${stock.petrol || 0} |
 🟡 ديزل1: ${stock.diesel1 || 0} |
 🟡 ديزل2: ${stock.diesel2 || 0}`;
}

/* الإدخال */
let type="",pumpName="",price=0,input="";

function selectPump(t,name,p){
 type=t;
 pumpName=name;
 price=p;
 keypad.style.display="grid";
}

function add(n){
 input+=n;
 display.innerText=input;
}

function clearInput(){
 input="";
 display.innerText="0";
}

/* 🔥 تسجيل عملية */
function startFuel(){

 let money=parseFloat(input||0);
 if(!money) return;

 let liters=money/price;

 if(type=="petrol") stock.petrol-=liters;
 if(type=="diesel1") stock.diesel1-=liters;
 if(type=="diesel2") stock.diesel2-=liters;

 db.ref("stock").set(stock);

 db.ref("logs").push({
  type:pumpName,
  amount:money,
  liters:liters,
  user:currentUser,
  time:new Date().toLocaleString()
 });

 input="";
 display.innerText="0";
 keypad.style.display="none";
}

/* السجل */
function showLogs(){
 db.ref("logs").once("value").then(s=>{
  let html="";
  s.forEach(c=>{
   let d=c.val();
   html+=`<div>${d.type} - ${d.amount} MRU - ${d.user}</div>`;
  });
  logsBox.innerHTML=html;
 });
 logsModal.style.display="block";
}

function closeLogs(){
 logsModal.style.display="none";
}

</script>

</body>
</html>
