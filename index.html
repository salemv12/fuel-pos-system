<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Fuel Pro Cloud</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body{font-family:Arial;background:#f1f5f9;direction:rtl;margin:0;padding:10px}
.card{background:linear-gradient(135deg,#c9a24b,#a67c2d);color:white;padding:15px;border-radius:15px}
.display{background:white;padding:15px;font-size:30px;text-align:center;margin:10px 0;border-radius:10px}
.pumps{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.pump{padding:20px;border-radius:10px;text-align:center}
.petrol{background:#22c55e;color:white}
.diesel{background:#facc15}
.keypad{display:none;grid-template-columns:repeat(3,1fr);gap:10px}
.keypad button{padding:15px}
.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px}
.btn{padding:15px;border:none;border-radius:10px}
.green{background:#c9a24b;color:white}
.red{background:#ef4444;color:white}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<input id="user" placeholder="user">
<input id="pass" type="password" placeholder="pass">
<button onclick="login()">دخول</button>
</div>

<div class="card">⛽ Fuel Pro Cloud</div>

<div>بنزين: <span id="pStock"></span></div>
<div>مازوت1: <span id="d1Stock"></span></div>
<div>مازوت2: <span id="d2Stock"></span></div>

<div class="display" id="display">0</div>

<div class="pumps">
<div class="pump petrol" onclick="selectPump(1,'بنزين',58.97)">⛽ بنزين1</div>
<div class="pump petrol" onclick="selectPump(2,'بنزين',58.97)">⛽ بنزين2</div>
<div class="pump diesel" onclick="selectPump(3,'ديزل',56.35)">⛽ ديزل1</div>
<div class="pump diesel" onclick="selectPump(4,'ديزل',56.35)">⛽ ديزل2</div>
</div>

<div class="keypad" id="keypad">
<button onclick="add(7)">7</button><button onclick="add(8)">8</button><button onclick="add(9)">9</button>
<button onclick="add(4)">4</button><button onclick="add(5)">5</button><button onclick="add(6)">6</button>
<button onclick="add(1)">1</button><button onclick="add(2)">2</button><button onclick="add(3)">3</button>
<button onclick="add(0)">0</button><button onclick="clearInput()">مسح</button>
</div>

<div class="actions">
<button class="btn green" onclick="startFuel()">ابدأ</button>
<button class="btn" onclick="openLog()">📋</button>
<button class="btn red" onclick="cancel()">إلغاء</button>
</div>

<script>

/* Firebase */
const firebaseConfig = {
  apiKey: "AIzaSyA7pNxijt03_TzDDNnwFbqhyUU-zcbJiq4",
  authDomain: "pkka7-a75c0.firebaseapp.com",
  databaseURL: "https://pkka7-a75c0-default-rtdb.firebaseio.com",
  projectId: "pkka7-a75c0",
  storageBucket: "pkka7-a75c0.firebasestorage.app",
  messagingSenderId: "730135985362",
  appId: "1:730135985362:web:8cf4bfd291e36e936d010b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* login */
function login(){
 if(user.value==="admin" && pass.value==="1234"){
  loginBox.style.display="none";
 }else alert("خطأ");
}

/* data */
let petrol=0,d1=0,d2=0,logs=[];
let pump=null,input="",type="",price=0;

/* init stock */
db.ref("stock").once("value").then(s=>{
 if(!s.exists()){
  db.ref("stock").set({petrol:2000,d1:1000,d2:1000});
 }
});

/* load stock */
db.ref("stock").on("value", s=>{
 let d=s.val();
 if(d){
  petrol=d.petrol;
  d1=d.d1;
  d2=d.d2;
  pStock.innerText=petrol;
  d1Stock.innerText=d1;
  d2Stock.innerText=d2;
 }
});

/* load logs */
db.ref("logs").on("value", s=>{
 logs=[];
 s.forEach(c=>logs.unshift(c.val()));
});

/* pumps */
function selectPump(p,t,pr){
 pump=p;type=t;price=pr;
 keypad.style.display="grid";
}

function add(n){input+=n;display.innerText=input;}
function clearInput(){input="";display.innerText="0";}

/* start */
function startFuel(){

 let l=parseFloat(input||0);
 if(!l)return alert("ادخل رقم");

 if(type==="بنزين"){
  if(l>petrol)return alert("لا يوجد مخزون");
  petrol-=l;
 }else{
  if(pump==3){if(l>d1)return alert("لا يوجد مخزون"); d1-=l;}
  else{if(l>d2)return alert("لا يوجد مخزون"); d2-=l;}
 }

 db.ref("stock").set({petrol,d1,d2});

 let cost=l*price;

 db.ref("logs").push({
  user:"admin",
  amount:cost,
  liters:l,
  type:type,
  pump:pump,
  time:new Date().toLocaleString()
 });

 input="";
 display.innerText="0";
 keypad.style.display="none";

 alert("تمت العملية ✅");
}

/* log */
function openLog(){
 let txt="";
 logs.forEach(l=>{
  txt+=`${l.type} - مضخة ${l.pump} - ${l.liters}L = ${l.amount}\n`;
 });
 alert(txt||"لا يوجد سجل");
}

function cancel(){
 input="";display.innerText="0";keypad.style.display="none";
}

</script>

</body>
</html>
