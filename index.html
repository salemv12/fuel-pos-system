<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نظام محطة الوقود</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f1f5f9;
  color:#1e293b;
  direction: rtl;
}

.container {padding:15px;}

.card {
  background: linear-gradient(135deg,#c9a24b,#a67c2d);
  color:white;
  border-radius:20px;
  padding:20px;
  margin-bottom:10px;
}

/* المخزون */
.stock {display:grid;gap:10px;margin-bottom:10px;}

.stock-card {
  background:white;
  padding:10px;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border:1px solid #e2e8f0;
}

.stock-card button {
  background:#c9a24b;
  color:white;
  border:none;
  padding:5px 10px;
  border-radius:8px;
}

/* الشاشة */
.display {
  background:white;
  color:#c9a24b;
  border-radius:15px;
  padding:20px;
  text-align:center;
  font-size:32px;
  margin-bottom:10px;
}

/* 🔥 المضخات الكبيرة */
.pumps {
  display:grid;
  grid-template-columns: repeat(2,1fr);
  gap:20px;
  margin-top:15px;
}

.pump {
  background:white;
  padding:35px 20px;
  border-radius:20px;
  text-align:center;
  cursor:pointer;
  font-size:22px;
  font-weight:bold;
  transition:0.3s;
  box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

.pump:hover {
  transform:translateY(-5px);
}

.pump.active {
  border:3px solid #c9a24b;
}

.pump-icon {
  font-size:45px;
  display:block;
  margin-bottom:10px;
}

/* ألوان */
.petrol {background:#22c55e;color:white;}
.diesel {background:#facc15;color:black;}

/* لوحة الأرقام */
.keypad {
  display:none;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:10px;
}

.keypad button {
  padding:20px;
  font-size:20px;
  border:none;
  border-radius:12px;
  background:white;
  border:1px solid #e2e8f0;
}

/* الأزرار */
.actions {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:10px;
}

.btn {
  padding:15px;
  border:none;
  border-radius:12px;
  font-size:18px;
}

.green {background:#c9a24b;color:white;}
.red {background:#ef4444;color:white;}
.gray {background:white;border:1px solid #e2e8f0;}

</style>
</head>

<body>

<div class="container">

<div class="card">
<h3>⛽ محطة الوقود</h3>
</div>

<!-- المخزون -->
<div class="stock">
<div class="stock-card">
⛽ البنزين: <span id="petrolStock">2000</span> لتر
<button onclick="refill('petrol')">+</button>
</div>

<div class="stock-card">
🟡 مازوت 1: <span id="diesel1Stock">1000</span> لتر
<button onclick="refill('diesel1')">+</button>
</div>

<div class="stock-card">
🟡 مازوت 2: <span id="diesel2Stock">1000</span> لتر
<button onclick="refill('diesel2')">+</button>
</div>
</div>

<!-- الشاشة -->
<div class="display" id="display">0</div>

<!-- المضخات -->
<div class="pumps">

<div class="pump petrol" onclick="selectPump(this,1,'بنزين',58.97)">
<span class="pump-icon">⛽</span>
بنزين 1
</div>

<div class="pump petrol" onclick="selectPump(this,2,'بنزين',58.97)">
<span class="pump-icon">⛽</span>
بنزين 2
</div>

<div class="pump diesel" onclick="selectPump(this,3,'ديزل',56.35)">
<span class="pump-icon">⛽</span>
ديزل 1
</div>

<div class="pump diesel" onclick="selectPump(this,4,'ديزل',56.35)">
<span class="pump-icon">⛽</span>
ديزل 2
</div>

</div>

<!-- لوحة الأرقام -->
<div class="keypad" id="keypad">
<button onclick="add(7)">7</button>
<button onclick="add(8)">8</button>
<button onclick="add(9)">9</button>
<button onclick="add(4)">4</button>
<button onclick="add(5)">5</button>
<button onclick="add(6)">6</button>
<button onclick="add(1)">1</button>
<button onclick="add(2)">2</button>
<button onclick="add(3)">3</button>
<button onclick="add(0)">0</button>
<button onclick="clearInput()">مسح</button>
</div>

<!-- الأزرار -->
<div class="actions">
<button class="btn green" onclick="startFuel()">ابدأ</button>
<button class="btn gray">📋 السجل</button>
<button class="btn red" onclick="cancel()">إلغاء</button>
</div>

</div>

<script>

let petrol=2000,diesel1=1000,diesel2=1000;
let pump=null,input="",type="",price=0;

function updateStock(){
 document.getElementById("petrolStock").innerText=petrol;
 document.getElementById("diesel1Stock").innerText=diesel1;
 document.getElementById("diesel2Stock").innerText=diesel2;
}

function refill(t){
 let a=parseFloat(prompt("كم لتر؟"));
 if(isNaN(a))return;
 if(t==="petrol")petrol+=a;
 if(t==="diesel1")diesel1+=a;
 if(t==="diesel2")diesel2+=a;
 updateStock();
}

function selectPump(el,p,t,pr){
 document.querySelectorAll(".pump").forEach(x=>x.classList.remove("active"));
 el.classList.add("active");

 pump=p;type=t;price=pr;

 document.getElementById("keypad").style.display="grid";
}

function add(n){
 input+=n;
 document.getElementById("display").innerText=input;
}

function clearInput(){
 input="";
 document.getElementById("display").innerText="0";
}

function startFuel(){
 if(!pump)return alert("اختر مضخة");

 let liters=parseFloat(input||0);

 if(type==="بنزين"){
  if(liters>petrol)return alert("المخزون غير كافي");
  petrol-=liters;
 }else{
  if(pump==3){
   if(liters>diesel1)return alert("المخزون غير كافي");
   diesel1-=liters;
  }else{
   if(liters>diesel2)return alert("المخزون غير كافي");
   diesel2-=liters;
  }
 }

 updateStock();

 input="";
 document.getElementById("display").innerText="0";
 document.getElementById("keypad").style.display="none";
}

function cancel(){
 pump=null;
 input="";
 document.getElementById("display").innerText="0";
 document.getElementById("keypad").style.display="none";
 document.querySelectorAll(".pump").forEach(x=>x.classList.remove("active"));
}

updateStock();

</script>

</body>
</html>
