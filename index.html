<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Fuel Pro System</title>

<style>
body {
  font-family:Arial;
  background:#f1f5f9;
  direction:rtl;
  margin:0;
}

.container{padding:15px}

/* HEADER */
.card{
  background:linear-gradient(135deg,#c9a24b,#a67c2d);
  color:white;
  padding:20px;
  border-radius:20px;
  margin-bottom:10px;
}

/* 🔥 المخزون */
.stock-card{
  background:white;
  padding:15px;
  border-radius:15px;
  margin-top:10px;
  font-size:22px;
  font-weight:bold;
  color:#0f172a;
  display:flex;
  justify-content:space-between;
}

.stock-card span{
  font-size:24px;
  font-weight:900;
  color:#c9a24b;
}

/* شريط */
.bar{
  width:100%;
  height:10px;
  background:#e2e8f0;
  border-radius:10px;
  margin-top:5px;
  overflow:hidden;
}

.bar div{
  height:100%;
  width:100%;
  background:#22c55e;
  transition:0.3s;
}

/* شاشة */
.display{
  background:white;
  color:#c9a24b;
  padding:20px;
  border-radius:15px;
  font-size:32px;
  text-align:center;
  margin:10px 0;
}

/* المضخات */
.pumps{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

.pump{
  padding:30px;
  border-radius:20px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
}

.petrol{background:#22c55e;color:white;}
.diesel{background:#facc15;}

.pump span{
  display:block;
  font-size:40px;
}

/* لوحة الأرقام */
.keypad{
  display:none;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:10px;
}

.keypad button{
  padding:20px;
  font-size:20px;
}

/* أزرار */
.actions{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:10px;
}

.btn{
  padding:15px;
  border:none;
  border-radius:10px;
}

.green{background:#c9a24b;color:white;}
.red{background:#ef4444;color:white;}

</style>
</head>

<body>

<div class="container">

<div class="card">⛽ Fuel Pro System</div>

<!-- 🔥 المخزون -->
<div class="stock-card">⛽ البنزين <span id="pStock">2000</span></div>
<div class="bar"><div id="pBar"></div></div>

<div class="stock-card">🟡 مازوت 1 <span id="d1Stock">1000</span></div>
<div class="bar"><div id="d1Bar"></div></div>

<div class="stock-card">🟡 مازوت 2 <span id="d2Stock">1000</span></div>
<div class="bar"><div id="d2Bar"></div></div>

<!-- الشاشة -->
<div class="display" id="display">0</div>

<!-- المضخات -->
<div class="pumps">
<div class="pump petrol" onclick="selectPump(this,1,'بنزين',58.97)"><span>⛽</span>بنزين 1</div>
<div class="pump petrol" onclick="selectPump(this,2,'بنزين',58.97)"><span>⛽</span>بنزين 2</div>
<div class="pump diesel" onclick="selectPump(this,3,'ديزل',56.35)"><span>⛽</span>ديزل 1</div>
<div class="pump diesel" onclick="selectPump(this,4,'ديزل',56.35)"><span>⛽</span>ديزل 2</div>
</div>

<!-- لوحة الأرقام -->
<div class="keypad" id="keypad">
<button onclick="add(7)">7</button>
<button onclick="add(8)">8</button>
<button onclick="add(9)">9</button>
<button onclick="add(4)">4</button>
<button onclick="add(5)">5</button>
<button onclick="add(6)">6</button>
<button onclick="add(1)">1</button>
<button onclick="add(2)">2</button>
<button onclick="add(3)">3</button>
<button onclick="add(0)">0</button>
<button onclick="clearInput()">مسح</button>
</div>

<!-- الأزرار -->
<div class="actions">
<button class="btn green" onclick="startFuel()">ابدأ</button>
<button class="btn" onclick="openLog()">📋</button>
<button class="btn red" onclick="cancel()">إلغاء</button>
</div>

</div>

<script>

let petrol=2000,d1=1000,d2=1000;
let pump=null,input="",type="",price=0;

function updateStock(){
 pStock.innerText=petrol;
 d1Stock.innerText=d1;
 d2Stock.innerText=d2;

 updateBar(pBar, petrol, 2000);
 updateBar(d1Bar, d1, 1000);
 updateBar(d2Bar, d2, 1000);
}

/* 🔥 لون الشريط */
function updateBar(el,val,max){
 let percent=(val/max)*100;
 el.style.width=percent+"%";

 if(percent<30){
  el.style.background="#ef4444";
  alert("⚠️ المخزون منخفض!");
 }else if(percent<60){
  el.style.background="#facc15";
 }else{
  el.style.background="#22c55e";
 }
}

/* اختيار مضخة */
function selectPump(el,p,t,pr){
 document.querySelectorAll(".pump").forEach(x=>x.style.outline="none");
 el.style.outline="3px solid black";

 pump=p;type=t;price=pr;
 keypad.style.display="grid";
}

/* إدخال */
function add(n){
 input+=n;
 display.innerText=input;
}

function clearInput(){
 input="";
 display.innerText="0";
}

/* ضخ */
function startFuel(){
 if(!pump)return alert("اختر مضخة");

 let l=parseFloat(input||0);

 if(type==="بنزين"){
  if(l>petrol)return alert("المخزون غير كافي");
  petrol-=l;
 }else{
  if(pump==3){
   if(l>d1)return alert("المخزون غير كافي");
   d1-=l;
  }else{
   if(l>d2)return alert("المخزون غير كافي");
   d2-=l;
  }
 }

 updateStock();

 input="";
 display.innerText="0";
 keypad.style.display="none";
}

/* إلغاء */
function cancel(){
 input="";
 display.innerText="0";
 keypad.style.display="none";
}

updateStock();

</script>

</body>
</html>
