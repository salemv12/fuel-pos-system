<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Fuel Pro System</title>

<style>
body {font-family:Arial;background:#f1f5f9;direction:rtl;margin:0}

#loginBox{
 position:fixed;top:0;left:0;width:100%;height:100%;
 background:#000000aa;display:flex;justify-content:center;align-items:center;
}
.login-card{
 background:white;padding:20px;border-radius:15px;width:300px;text-align:center;
}

.container{padding:15px}

.card{
 background:linear-gradient(135deg,#c9a24b,#a67c2d);
 color:white;padding:20px;border-radius:20px;margin-bottom:10px
}

/* المخزون */
.stock-card{
 background:white;padding:15px;border-radius:15px;margin-top:10px;
 font-size:20px;font-weight:bold;display:flex;justify-content:space-between;
 align-items:center;
}
.stock-card button{
 background:#c9a24b;color:white;border:none;border-radius:8px;
 padding:5px 10px;cursor:pointer;
}

/* الشاشة */
.display{
 background:white;color:#c9a24b;padding:20px;border-radius:15px;
 text-align:center;font-size:30px;margin:10px 0
}

/* المضخات */
.pumps{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.pump{
 padding:30px;border-radius:20px;text-align:center;font-size:20px;
 font-weight:bold;cursor:pointer
}
.petrol{background:#22c55e;color:white}
.diesel{background:#facc15}
.pump span{font-size:40px;display:block}

/* لوحة الأرقام */
.keypad{display:none;grid-template-columns:repeat(3,1fr);gap:10px}
.keypad button{padding:20px;font-size:20px}

/* الأزرار */
.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
.btn{padding:15px;border:none;border-radius:10px}
.green{background:#c9a24b;color:white}
.red{background:#ef4444;color:white}

/* السجل */
.modal{
 display:none;position:fixed;top:0;left:0;width:100%;height:100%;
 background:#00000088
}
.modal-box{
 background:white;margin:40px auto;padding:20px;border-radius:15px;width:90%
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<div class="login-card">
<h3>🔐 تسجيل الدخول</h3>
<input id="user" placeholder="المستخدم"><br><br>
<input id="pass" type="password" placeholder="كلمة المرور"><br><br>
<button onclick="login()">دخول</button>
</div>
</div>

<div class="container">

<div class="card">⛽ Fuel Pro System</div>

<!-- المخزون -->
<div class="stock-card">
⛽ البنزين <span id="pStock">2000</span>
<button onclick="refill('petrol')">+</button>
</div>

<div class="stock-card">
🟡 مازوت 1 <span id="d1Stock">1000</span>
<button onclick="refill('d1')">+</button>
</div>

<div class="stock-card">
🟡 مازوت 2 <span id="d2Stock">1000</span>
<button onclick="refill('d2')">+</button>
</div>

<div class="display" id="display">0</div>

<!-- المضخات -->
<div class="pumps">
<div class="pump petrol" onclick="selectPump(this,1,'بنزين',58.97)"><span>⛽</span>بنزين 1</div>
<div class="pump petrol" onclick="selectPump(this,2,'بنزين',58.97)"><span>⛽</span>بنزين 2</div>
<div class="pump diesel" onclick="selectPump(this,3,'ديزل',56.35)"><span>⛽</span>ديزل 1</div>
<div class="pump diesel" onclick="selectPump(this,4,'ديزل',56.35)"><span>⛽</span>ديزل 2</div>
</div>

<!-- لوحة الأرقام -->
<div class="keypad" id="keypad">
<button onclick="add(7)">7</button>
<button onclick="add(8)">8</button>
<button onclick="add(9)">9</button>
<button onclick="add(4)">4</button>
<button onclick="add(5)">5</button>
<button onclick="add(6)">6</button>
<button onclick="add(1)">1</button>
<button onclick="add(2)">2</button>
<button onclick="add(3)">3</button>
<button onclick="add(0)">0</button>
<button onclick="clearInput()">مسح</button>
</div>

<!-- الأزرار -->
<div class="actions">
<button class="btn green" onclick="startFuel()">ابدأ</button>
<button class="btn" id="logBtn" onclick="openLog()">📋 السجل</button>
<button class="btn red" onclick="cancel()">إلغاء</button>
</div>

</div>

<!-- السجل -->
<div class="modal" id="logModal">
<div class="modal-box">
<h3>📋 سجل العمليات</h3>
<div id="logList"></div>
<button onclick="clearLog()">🗑 حذف</button>
<button onclick="closeLog()">إغلاق</button>
</div>
</div>

<script>

/* المستخدم */
let currentUser="";

/* تسجيل الدخول */
function login(){
 let u=user.value,p=pass.value;

 if(u==="admin" && p==="1234"){
   currentUser="admin";
 }else if(u==="cash" && p==="0000"){
   currentUser="cash";
   logBtn.style.display="none";
 }else{
   return alert("بيانات خاطئة");
 }

 loginBox.style.display="none";
}

/* البيانات */
let petrol=2000,d1=1000,d2=1000;
let pump=null,input="",type="",price=0;
let logs=JSON.parse(localStorage.getItem("logs")||"[]");

/* تحديث المخزون */
function updateStock(){
 pStock.innerText=petrol;
 d1Stock.innerText=d1;
 d2Stock.innerText=d2;
}

/* تعبئة */
function refill(t){
 let a=parseFloat(prompt("كم لتر؟"));
 if(isNaN(a))return;

 if(t==="petrol")petrol+=a;
 if(t==="d1")d1+=a;
 if(t==="d2")d2+=a;

 updateStock();
}

/* اختيار مضخة */
function selectPump(el,p,t,pr){
 document.querySelectorAll(".pump").forEach(x=>x.style.outline="none");
 el.style.outline="3px solid black";

 pump=p;type=t;price=pr;
 keypad.style.display="grid";
}

/* إدخال */
function add(n){input+=n;display.innerText=input;}
function clearInput(){input="";display.innerText="0";}

/* ضخ */
function startFuel(){
 if(!pump)return alert("اختر مضخة");

 let l=parseFloat(input||0);

 if(type==="بنزين"){
  if(l>petrol)return alert("المخزون غير كافي");
  petrol-=l;
 }else{
  if(pump==3){
   if(l>d1)return alert("المخزون غير كافي");
   d1-=l;
  }else{
   if(l>d2)return alert("المخزون غير كافي");
   d2-=l;
  }
 }

 updateStock();

 let cost=l*price;
 let time=new Date().toLocaleString("ar");

 let log=`👤 ${currentUser}
🕒 ${time}
⛽ ${type}
🔢 مضخة ${pump}
📦 ${l} لتر
💰 ${cost.toFixed(2)} أوقية`;

 logs.unshift(log);
 localStorage.setItem("logs",JSON.stringify(logs));

 input="";
 display.innerText="0";
 keypad.style.display="none";
}

/* إلغاء */
function cancel(){
 input="";
 display.innerText="0";
 keypad.style.display="none";
}

/* السجل */
function openLog(){
 let box=document.getElementById("logList");
 box.innerHTML="";

 if(logs.length===0){
  box.innerHTML="<p>لا يوجد عمليات</p>";
 }else{
  logs.forEach(l=>{
   box.innerHTML+=`<div style="background:#f1f5f9;padding:10px;margin:5px;border-radius:10px">${l.replace(/\n/g,"<br>")}</div>`;
  });
 }

 logModal.style.display="block";
}

function closeLog(){logModal.style.display="none";}

function clearLog(){
 logs=[];
 localStorage.removeItem("logs");
 openLog();
}

updateStock();

</script>

</body>
</html>
