<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نظام محطة الوقود</title>

<style>

body {
  margin:0;
  font-family: Arial;
  background:#f1f5f9;
  color:#1e293b;
  direction: rtl;
}

.container {
  padding:15px;
}

/* بطاقة مثل البنك */
.card {
  background: linear-gradient(135deg,#c9a24b,#a67c2d);
  color:white;
  border-radius:20px;
  padding:20px;
  margin-bottom:15px;
}

/* الشاشة */
.display {
  background:white;
  color:#c9a24b;
  border-radius:15px;
  padding:20px;
  text-align:center;
  font-size:32px;
  margin-bottom:15px;
}

/* المضخات */
.pumps {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.pump {
  background:white;
  border-radius:15px;
  padding:20px;
  text-align:center;
  font-size:18px;
  border:1px solid #e2e8f0;
  cursor:pointer;
}

.pump.active {
  border:2px solid #c9a24b;
}

/* الأرقام */
.keypad {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:15px;
}

.keypad button {
  padding:20px;
  font-size:20px;
  background:white;
  border:none;
  border-radius:12px;
  border:1px solid #e2e8f0;
  cursor:pointer;
}

/* الأزرار */
.actions {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:15px;
}

.btn {
  padding:15px;
  border:none;
  border-radius:12px;
  font-size:18px;
  cursor:pointer;
}

.green {
  background:#c9a24b;
  color:white;
}

.red {
  background:#ef4444;
  color:white;
}

.gray {
  background:white;
  border:1px solid #e2e8f0;
}

/* السجل */
#billModal {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:85%;
  height:70%;
  background:white;
  border-radius:15px;
  padding:15px;
  display:none;
  flex-direction:column;
}

</style>
</head>

<body>

<div class="container">

<!-- بطاقة -->
<div class="card">
<h2>⛽ محطة الوقود</h2>
<p>نظام إدارة متكامل</p>
</div>

<!-- شاشة -->
<div class="display" id="display">0</div>

<!-- المضخات -->
<div class="pumps">

<div class="pump" onclick="selectPump(this,1,'بنزين',58.97)">
⛽<br>بنزين 1
</div>

<div class="pump" onclick="selectPump(this,2,'بنزين',58.97)">
⛽<br>بنزين 2
</div>

<div class="pump" onclick="selectPump(this,3,'ديزل',56.35)">
⛽<br>ديزل 1
</div>

<div class="pump" onclick="selectPump(this,4,'ديزل',56.35)">
⛽<br>ديزل 2
</div>

</div>

<!-- لوحة الأرقام -->
<div class="keypad">
<button onclick="add(7)">7</button>
<button onclick="add(8)">8</button>
<button onclick="add(9)">9</button>
<button onclick="add(4)">4</button>
<button onclick="add(5)">5</button>
<button onclick="add(6)">6</button>
<button onclick="add(1)">1</button>
<button onclick="add(2)">2</button>
<button onclick="add(3)">3</button>
<button onclick="add(0)">0</button>
<button onclick="clearInput()">مسح</button>
</div>

<!-- الأزرار -->
<div class="actions">
<button class="btn green" onclick="startFuel()">ابدأ</button>
<button class="btn gray" onclick="toggleBill()">📋 السجل</button>
<button class="btn red" onclick="cancel()">إلغاء</button>
</div>

</div>

<!-- السجل -->
<div id="billModal">
<h3>السجل</h3>

<div id="bill" style="flex:1;overflow:auto;background:#f1f5f9;padding:10px;border-radius:10px;"></div>
<div id="total">المجموع: 0 أوقية</div>

<button onclick="toggleBill()" class="btn red">إغلاق</button>
</div>

<script>

let pump=null,input="",total=0,type="",price=0;

function selectPump(el,p,t,pr){
 document.querySelectorAll(".pump").forEach(x=>x.classList.remove("active"));
 el.classList.add("active");
 pump=p;type=t;price=pr;
}

function add(n){
 input+=n;
 document.getElementById("display").innerText=input;
}

function clearInput(){
 input="";
 document.getElementById("display").innerText="0";
}

function startFuel(){
 if(!pump)return alert("اختر مضخة");

 let liters=parseFloat(input||0);
 let cost=liters*price;
 total+=cost;

 document.getElementById("bill").innerHTML+=
 `<p>${type} - ${liters} لتر = ${cost.toFixed(2)} أوقية</p>`;

 document.getElementById("total").innerText=
 "المجموع: "+total.toFixed(2)+" أوقية";

 input="";
 document.getElementById("display").innerText="0";
}

function toggleBill(){
 let modal=document.getElementById("billModal");
 modal.style.display=modal.style.display==="flex"?"none":"flex";
}

function cancel(){
 location.reload();
}

</script>

</body>
</html>
