<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Fuel Pro MAX</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#f1f5f9;direction:rtl;margin:0}
.container{padding:15px}

.card{
 background:linear-gradient(135deg,#c9a24b,#a67c2d);
 color:white;padding:20px;border-radius:20px;margin-bottom:10px
}

.stock-card{
 background:white;padding:15px;border-radius:15px;margin-top:10px;
 display:flex;justify-content:space-between;font-size:20px;font-weight:bold
}

.display{
 background:white;color:#c9a24b;padding:20px;border-radius:15px;
 text-align:center;font-size:30px;margin:10px 0
}

.pumps{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.pump{padding:30px;border-radius:20px;text-align:center;font-size:20px;cursor:pointer}
.petrol{background:#22c55e;color:white}
.diesel{background:#facc15}

.keypad{display:none;grid-template-columns:repeat(3,1fr);gap:10px}
.keypad button{padding:20px;font-size:20px}

.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px}
.btn{padding:15px;border:none;border-radius:10px}
.green{background:#c9a24b;color:white}
.red{background:#ef4444;color:white}

.modal{
 display:none;position:fixed;top:0;left:0;width:100%;height:100%;
 background:#00000088
}
.modal-box{
 background:white;margin:40px auto;padding:20px;border-radius:15px;width:90%
}
</style>
</head>

<body>

<div class="container">

<div class="card">⛽ Fuel Pro MAX</div>

<!-- stock -->
<div class="stock-card">بنزين <span id="pStock"></span></div>
<div class="stock-card">مازوت1 <span id="d1Stock"></span></div>
<div class="stock-card">مازوت2 <span id="d2Stock"></span></div>

<div class="display" id="display">0</div>

<!-- pumps -->
<div class="pumps">
<div class="pump petrol" onclick="selectPump(this,1,'بنزين',58.97)">⛽ بنزين 1</div>
<div class="pump petrol" onclick="selectPump(this,2,'بنزين',58.97)">⛽ بنزين 2</div>
<div class="pump diesel" onclick="selectPump(this,3,'ديزل',56.35)">⛽ ديزل 1</div>
<div class="pump diesel" onclick="selectPump(this,4,'ديزل',56.35)">⛽ ديزل 2</div>
</div>

<div class="keypad" id="keypad">
<button onclick="add(7)">7</button><button onclick="add(8)">8</button><button onclick="add(9)">9</button>
<button onclick="add(4)">4</button><button onclick="add(5)">5</button><button onclick="add(6)">6</button>
<button onclick="add(1)">1</button><button onclick="add(2)">2</button><button onclick="add(3)">3</button>
<button onclick="add(0)">0</button><button onclick="clearInput()">مسح</button>
</div>

<div class="actions">
<button class="btn green" onclick="startFuel()">ابدأ</button>
<button class="btn" id="logBtn" onclick="openLog()">📋</button>
<button class="btn" id="reportBtn" onclick="openReport()">📊</button>
<button class="btn red" onclick="cancel()">إلغاء</button>
</div>

</div>

<!-- LOG -->
<div class="modal" id="logModal">
<div class="modal-box">
<h3>📋 السجل</h3>
<div id="logList"></div>
<button onclick="closeLog()">إغلاق</button>
</div>
</div>

<!-- REPORT -->
<div class="modal" id="reportModal">
<div class="modal-box">
<h3>📊 تقرير</h3>
<div id="reportBox"></div>
<canvas id="chart"></canvas>
<button onclick="closeReport()">إغلاق</button>
</div>
</div>

<script>

let currentUser="admin";

/* stock */
let petrol=parseFloat(localStorage.getItem("petrol"))||2000;
let d1=parseFloat(localStorage.getItem("d1"))||1000;
let d2=parseFloat(localStorage.getItem("d2"))||1000;

let logs=JSON.parse(localStorage.getItem("logs")||"[]");

function saveStock(){
 localStorage.setItem("petrol",petrol);
 localStorage.setItem("d1",d1);
 localStorage.setItem("d2",d2);
}

function updateStock(){
 pStock.innerText=petrol;
 d1Stock.innerText=d1;
 d2Stock.innerText=d2;
 saveStock();
}

/* pump */
let pump=null,input="",type="",price=0;

function selectPump(el,p,t,pr){
 pump=p;type=t;price=pr;
 keypad.style.display="grid";
}

function add(n){input+=n;display.innerText=input;}
function clearInput(){input="";display.innerText="0";}

function startFuel(){
 let l=parseFloat(input||0);
 if(type==="بنزين"){if(l>petrol)return;petrol-=l;}
 else{if(pump==3){if(l>d1)return;d1-=l;}else{if(l>d2)return;d2-=l;}}

 updateStock();

 let cost=l*price;
 let time=new Date().toLocaleString("ar");

 let log=`${currentUser}|${cost}`;
 logs.unshift(log);
 localStorage.setItem("logs",JSON.stringify(logs));

 input="";display.innerText="0";keypad.style.display="none";
}

/* log */
function openLog(){
 logList.innerHTML=logs.map(l=>`<p>${l}</p>`).join("");
 logModal.style.display="block";
}
function closeLog(){logModal.style.display="none";}

/* report */
function openReport(){
 let total=0,admin=0,cash=0;

 logs.forEach(l=>{
  let parts=l.split("|");
  let user=parts[0];
  let val=parseFloat(parts[1]);

  total+=val;
  if(user==="admin")admin+=val;
  if(user==="cash")cash+=val;
 });

 reportBox.innerHTML=`
 📦 العمليات: ${logs.length}<br>
 💰 الإجمالي: ${total.toFixed(2)}<br>
 👤 admin: ${admin.toFixed(2)}<br>
 👤 cash: ${cash.toFixed(2)}
 `;

 let ctx=document.getElementById("chart");
 new Chart(ctx,{
  type:"bar",
  data:{
   labels:["admin","cash"],
   datasets:[{data:[admin,cash]}]
  }
 });

 reportModal.style.display="block";
}

function closeReport(){reportModal.style.display="none";}

function cancel(){
 input="";display.innerText="0";keypad.style.display="none";
}

updateStock();

</script>

</body>
</html>
